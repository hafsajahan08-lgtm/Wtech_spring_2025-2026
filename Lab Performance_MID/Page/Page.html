<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management Page</title>
  <link rel="stylesheet" href="/Lab Performance_MID/Design/Style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="card-title">Product Management Page</h1>

      <div class="form-group">
        <label for="unitPrice">Unit Price:</label>
        <input type="number" id="unitPrice" value="1000" readonly>
      </div>

      <div class="form-group">
        <label for="quantityPerDay">Quantity per Day:</label>
        <input type="number" id="quantityPerDay" placeholder="Enter quantity per day" min="0">
        <div id="errorMessage" class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="totalPrice">Total Price for 30 Days:</label>
        <input type="text" id="totalPrice" value="0" readonly>
      </div>
    </div>
  </div>

  <script src="/Lab Performance_MID/JavaScript/Validation.js"></script>
</body>
</html>
