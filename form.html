<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us Form</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="form container">
   <h1> 
    Contact us
   </h1> 
   <form id = "contactForm">
   <table> 
    <tr> 
        <td>
            
            <label>
                First name
            </label><br>
            <input type="text" id ="Firstname">
        </td>
        <td>
            <label>
                Last name
            </label><br>
            <input type="text" id ="Lastname">
        </td>
        <td>
            <label>
              Email
            </label><br>
            <input type="text" id ="email">
        </td>
        <td>
            <label>
                Phone number
            </label><br>
            <input type="text" id ="phone">
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <label>What do you have in mind</label><br>
            <textarea id="message" placeholder="please enter query">
            </textarea>
        </td>
    </tr>
      <tr>
        <td colspan="2"  style="text-align:center;">
            <button type="submit" id="submitBtn">submit</button>

        </td>
      </tr>     

   </table>
   </form>
   </div>
</body>

</html>
